name: World_Of_Fog
description: Discover the real world with a fantasy fog-of-war map.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_map: ^8.2.2
  geolocator: ^14.0.2
  path_provider: ^2.1.5
  share_plus: ^12.0.1
  latlong2: ^0.9.1
  cross_file: ^0.3.5+2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true